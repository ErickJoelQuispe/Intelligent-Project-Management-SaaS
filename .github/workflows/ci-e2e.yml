name: CI — E2E

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Start stack
        run: docker compose up -d

      - name: Wait for api-gateway
        run: |
          echo "Waiting for api-gateway to be healthy..."
          timeout=60
          elapsed=0
          until curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; do
            if [ $elapsed -ge $timeout ]; then
              echo "api-gateway did not become healthy within ${timeout}s"
              docker compose logs api-gateway
              exit 1
            fi
            sleep 5
            elapsed=$((elapsed + 5))
          done
          echo "api-gateway is healthy"

      - name: Wait for Keycloak
        run: |
          echo "Waiting for Keycloak to be ready..."
          timeout=180
          elapsed=0
          until [ "$(docker inspect --format='{{.State.Health.Status}}' epm-keycloak 2>/dev/null)" = "healthy" ]; do
            if [ $elapsed -ge $timeout ]; then
              echo "Keycloak did not become healthy within ${timeout}s"
              docker compose logs keycloak
              exit 1
            fi
            sleep 5
            elapsed=$((elapsed + 5))
          done
          echo "Keycloak is ready"

      - name: Configure Keycloak
        run: |
          docker exec epm-keycloak /opt/keycloak/bin/kcadm.sh config credentials \
            --server http://localhost:8080 --realm master --user admin --password admin

          CLIENT_UUID=$(docker exec epm-keycloak /opt/keycloak/bin/kcadm.sh get clients -r epm --fields id,clientId \
            | grep -B1 '"clientId" : "epm-backend"' | grep '"id"' \
            | sed 's/.*"id" : "\([^"]*\)".*/\1/')

          SA_ID=$(docker exec epm-keycloak /opt/keycloak/bin/kcadm.sh get "clients/$CLIENT_UUID/service-account-user" -r epm --fields id \
            | grep '"id"' | sed 's/.*"id" : "\([^"]*\)".*/\1/')

          echo "Granting realm-management roles to service account $SA_ID..."
          docker exec epm-keycloak /opt/keycloak/bin/kcadm.sh add-roles -r epm \
            --uid "$SA_ID" --cclientid realm-management --rolename realm-admin 2>&1 \
            && echo "  realm-admin: OK" || echo "  realm-admin: already present"
          docker exec epm-keycloak /opt/keycloak/bin/kcadm.sh add-roles -r epm \
            --uid "$SA_ID" --cclientid realm-management --rolename manage-users 2>&1 \
            && echo "  manage-users: OK" || echo "  manage-users: already present"

      - name: Restart auth-service
        run: |
          docker compose restart auth-service
          timeout=60
          elapsed=0
          until curl -sf http://localhost:8081/actuator/health > /dev/null 2>&1; do
            if [ $elapsed -ge $timeout ]; then
              echo "auth-service did not recover after restart"
              docker compose logs auth-service | tail -30
              exit 1
            fi
            sleep 3
            elapsed=$((elapsed + 3))
          done
          echo "auth-service restarted and healthy"

      - name: Wait for auth route via gateway
        run: |
          echo "Waiting for auth-service to be reachable via api-gateway..."
          timeout=120
          elapsed=0
          until STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:8080/api/v1/auth/register \
              -H "Content-Type: application/json" \
              -d '{"email":"probe@ci.local","password":"Probe1!","firstName":"CI","lastName":"Probe"}') \
            && echo "$STATUS" | grep -qE "^(201|400|409|422)$"; do
            echo "  gateway returned $STATUS — waiting..."
            if [ $elapsed -ge $timeout ]; then
              echo "auth route not reachable via gateway after ${timeout}s"
              docker compose logs api-gateway
              docker compose logs auth-service
              exit 1
            fi
            sleep 5
            elapsed=$((elapsed + 5))
          done
          echo "auth route is up (gateway returned $STATUS)"

      - name: Run E2E tests
        run: ./mvnw verify -Pe2e -pl e2e-tests --batch-mode

      - name: Tear down stack
        if: always()
        run: docker compose down -v
