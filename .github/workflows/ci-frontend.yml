name: CI — Frontend

on:
  push:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [master]
    paths:
      - 'frontend/**'
      - '.github/workflows/ci-frontend.yml'

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Unit Tests
  # ──────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/epm-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: bun run ng test -- --watch=false

  # ──────────────────────────────────────────────────────────────
  # Job 2: Production Build
  # Uploads dist/ artifact for downstream jobs.
  # ──────────────────────────────────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [test]
    defaults:
      run:
        working-directory: frontend/epm-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (production)
        run: bunx ng build --configuration=production

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/epm-frontend/dist/
          retention-days: 1

  # ──────────────────────────────────────────────────────────────
  # Job 3: Lighthouse Audit
  # Serves the production build and audits performance/a11y.
  # ──────────────────────────────────────────────────────────────
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Install audit tools
        run: npm install -g @lhci/cli http-server

      - name: Serve production build
        run: http-server dist/epm-frontend/browser -p 4200 --silent &

      - name: Wait for server
        run: sleep 3

      - name: Run Lighthouse CI
        run: lhci autorun
        working-directory: frontend/epm-frontend
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Job 4: Docker Build & Push to GHCR
  # Only runs on push to master (never on PRs).
  # ──────────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [lighthouse]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend/epm-frontend
          file: frontend/epm-frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/erickjoelquispe/epm-frontend:latest
            ghcr.io/erickjoelquispe/epm-frontend:sha-${{ steps.vars.outputs.sha_short }}
