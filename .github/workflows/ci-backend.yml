name: CI — Backend

on:
  push:
    branches: [master]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'build-tools/**'
      - 'pom.xml'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [master]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'build-tools/**'
      - 'pom.xml'
      - '.github/workflows/ci-backend.yml'

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Build & Test
  # Runs on every push and PR. Testcontainers uses Docker on ubuntu-latest.
  # ──────────────────────────────────────────────────────────────
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: ./mvnw test --batch-mode

      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Job 2: SonarCloud Analysis
  # Depends on test passing. Skips tests (already ran above).
  # ──────────────────────────────────────────────────────────────
  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for SonarCloud blame information

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run SonarCloud analysis
        run: |
          ./mvnw verify sonar:sonar -Psonar \
            --batch-mode \
            -DskipTests \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

  # ──────────────────────────────────────────────────────────────
  # Job 3: Build & Push Docker images to GHCR
  # Only runs on push to master (never on PRs).
  # Builds all 9 service images sequentially.
  # ──────────────────────────────────────────────────────────────
  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [sonar]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build all JARs
        run: ./mvnw package -DskipTests --batch-mode

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: vars
        run: echo "sha_short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build & push discovery-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/discovery-service/Dockerfile
          push: true
          tags: |
            ghcr.io/erickjoelquispe/epm-discovery:latest
            ghcr.io/erickjoelquispe/epm-discovery:sha-${{ steps.vars.outputs.sha_short }}

      - name: Build & push config-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/config-service/Dockerfile
          push: true
          tags: |
            ghcr.io/erickjoelquispe/epm-config:latest
            ghcr.io/erickjoelquispe/epm-config:sha-${{ steps.vars.outputs.sha_short }}

      - name: Build & push api-gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api-gateway/Dockerfile
          push: true
          tags: |
            ghcr.io/erickjoelquispe/epm-gateway:latest
            ghcr.io/erickjoelquispe/epm-gateway:sha-${{ steps.vars.outputs.sha_short }}

      - name: Build & push auth-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/auth-service/Dockerfile
          push: true
          tags: |
            ghcr.io/erickjoelquispe/epm-auth:latest
            ghcr.io/erickjoelquispe/epm-auth:sha-${{ steps.vars.outputs.sha_short }}

      - name: Build & push user-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/user-service/Dockerfile
          push: true
          tags: |
            ghcr.io/erickjoelquispe/epm-user:latest
            ghcr.io/erickjoelquispe/epm-user:sha-${{ steps.vars.outputs.sha_short }}

      - name: Build & push project-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/project-service/Dockerfile
          push: true
          tags: |
            ghcr.io/erickjoelquispe/epm-project:latest
            ghcr.io/erickjoelquispe/epm-project:sha-${{ steps.vars.outputs.sha_short }}

      - name: Build & push task-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/task-service/Dockerfile
          push: true
          tags: |
            ghcr.io/erickjoelquispe/epm-task:latest
            ghcr.io/erickjoelquispe/epm-task:sha-${{ steps.vars.outputs.sha_short }}

      - name: Build & push notification-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/notification-service/Dockerfile
          push: true
          tags: |
            ghcr.io/erickjoelquispe/epm-notification:latest
            ghcr.io/erickjoelquispe/epm-notification:sha-${{ steps.vars.outputs.sha_short }}

      - name: Build & push ai-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/ai-service/Dockerfile
          push: true
          tags: |
            ghcr.io/erickjoelquispe/epm-ai:latest
            ghcr.io/erickjoelquispe/epm-ai:sha-${{ steps.vars.outputs.sha_short }}

  # ──────────────────────────────────────────────────────────────
  # Job 4: Trivy vulnerability scanning
  # Scans all pushed images. Fails on CRITICAL only.
  # HIGH vulnerabilities are reported but do NOT block the pipeline
  # (many are in transitive deps with no available fix in the
  # current Spring Boot BOM — tracked as security debt).
  # Only runs on push to master (after images are published).
  # ──────────────────────────────────────────────────────────────
  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Scan epm-discovery
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/erickjoelquispe/epm-discovery:latest
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Scan epm-config
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/erickjoelquispe/epm-config:latest
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Scan epm-gateway
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/erickjoelquispe/epm-gateway:latest
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Scan epm-auth
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/erickjoelquispe/epm-auth:latest
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Scan epm-user
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/erickjoelquispe/epm-user:latest
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Scan epm-project
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/erickjoelquispe/epm-project:latest
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Scan epm-task
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/erickjoelquispe/epm-task:latest
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Scan epm-notification
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/erickjoelquispe/epm-notification:latest
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true

      - name: Scan epm-ai
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/erickjoelquispe/epm-ai:latest
          format: table
          severity: CRITICAL
          exit-code: '1'
          ignore-unfixed: true
