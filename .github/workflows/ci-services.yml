name: CI — Services

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'build-tools/**'
      - 'pom.xml'
      - '.github/workflows/ci-services.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'build-tools/**'
      - 'pom.xml'
      - '.github/workflows/ci-services.yml'

jobs:
  build-and-test:
    name: Build, Checkstyle & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Enforce tooling versions
        run: ./mvnw validate --batch-mode

      - name: Run tests
        run: ./mvnw test --batch-mode

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'
          retention-days: 7
