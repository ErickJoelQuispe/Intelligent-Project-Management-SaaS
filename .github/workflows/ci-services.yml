name: CI — Services

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'build-tools/**'
      - 'pom.xml'
      - 'frontend/**'
      - '.github/workflows/ci-services.yml'
  pull_request:
    branches: [main]
    paths:
      - 'services/**'
      - 'shared/**'
      - 'build-tools/**'
      - 'pom.xml'
      - 'frontend/**'
      - '.github/workflows/ci-services.yml'

jobs:
  build-and-test:
    name: Build, Checkstyle & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Enforce tooling versions
        run: ./mvnw validate --batch-mode

      - name: Run tests
        run: ./mvnw test --batch-mode

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'
          retention-days: 7

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/epm-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun run ng test -- --watch=false
