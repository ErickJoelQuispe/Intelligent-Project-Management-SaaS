# Configuración específica del api-gateway.
# Este servicio no necesita datasource ni Flyway — sin DB propia.
spring:
  datasource:
    url: ""
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false

  # jwks-uri se configura via variable de entorno SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWKS_URI
  # En Docker: http://epm-keycloak:8080/realms/epm/protocol/openid-connect/certs
  # En local:  http://localhost:8180/realms/epm/protocol/openid-connect/certs

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:4200"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true
                maxAge: 3600
          routes:
            - id: auth-register-public
              uri: lb://auth-service
              predicates:
                - Path=/api/v1/auth/register
                - Method=POST
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/v1/auth/**
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**
            - id: teams-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/teams/**
            - id: project-service
              uri: lb://project-service
              predicates:
                - Path=/api/v1/projects/**
            - id: task-service
              uri: lb://task-service
              order: -1
              predicates:
                - Path=/api/v1/tasks/**, /api/v1/projects/*/tasks/**
