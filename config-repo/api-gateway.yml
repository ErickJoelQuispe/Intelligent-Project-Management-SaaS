# Configuración específica del api-gateway.
# Este servicio no necesita datasource ni Flyway — sin DB propia.
#
# ─── API Gateway Route Order Convention ───────────────────────────────────────
# The `order` field controls evaluation priority across routes.
#
#   Rule: LOWER order value → HIGHER priority (evaluated first).
#
#   Convention:
#     - Routes with SPECIFIC path patterns (e.g. /api/v1/projects/*/tasks/**)
#       MUST have a LOWER (more negative) order than routes with BROAD patterns
#       (e.g. /api/v1/projects/**).
#     - Routes WITHOUT an explicit `order` field default to 0 (lowest priority).
#
#   Why this matters:
#     Spring Cloud Gateway evaluates routes in ascending order value. If
#     /api/v1/projects/** (order: 0) is evaluated before
#     /api/v1/projects/*/tasks/** (order: -1), requests to /projects/X/tasks
#     would be incorrectly routed to project-service instead of task-service.
#
#   Order table (current assignments):
#     order: -1  → task-service   (specific: /api/v1/projects/*/tasks/**)
#     order:  0  → all other routes (broad patterns, default)
#
#   Adding a new service:
#     1. If the path is a SUB-PATH of an existing route, assign a more
#        negative order (e.g. order: -2 for sub-sub-paths).
#     2. If the path is independent (no conflict), use order: 0 (default).
#     3. Document the reasoning with an inline comment on the `order:` line.
# ─────────────────────────────────────────────────────────────────────────────
spring:
  datasource:
    url: ""
  jpa:
    hibernate:
      ddl-auto: none
  flyway:
    enabled: false
  # Reactor context propagation — required for trace context across WebFlux operator boundaries
  reactor:
    context-propagation: auto

  # jwks-uri se configura via variable de entorno SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWKS_URI
  # En Docker: http://epm-keycloak:8080/realms/epm/protocol/openid-connect/certs
  # En local:  http://localhost:8180/realms/epm/protocol/openid-connect/certs

  cloud:
    gateway:
      # Disable Eureka auto-generated routes. These conflict with manually-defined
      # routes because they strip the /api/v1/ prefix via a RewritePath filter,
      # causing downstream services to receive incorrect paths (e.g. /chat/stream
      # instead of /api/v1/ai/chat/stream). All routing is explicit below.
      discovery:
        locator:
          enabled: false
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:4200"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - PATCH
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true
                maxAge: 3600
          routes:
            # order: 0 (default) — broad /auth/** pattern, no conflict
            - id: auth-register-public
              uri: lb://auth-service
              predicates:
                - Path=/api/v1/auth/register
                - Method=POST
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/v1/auth/**
            # order: 0 (default) — /users/** has no sub-path conflicts
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/users/**
            # order: 0 (default) — /teams/** has no sub-path conflicts
            - id: teams-service
              uri: lb://user-service
              predicates:
                - Path=/api/v1/teams/**
            # order: 0 (default) — /projects/** broad pattern; task-service
            #   uses order: -1 to take precedence for /projects/*/tasks/**
            - id: project-service
              uri: lb://project-service
              predicates:
                - Path=/api/v1/projects/**
            # order: -1 — HIGHER priority than project-service (order: 0).
            #   Required because /api/v1/projects/*/tasks/** is a SUB-PATH of
            #   /api/v1/projects/**, and Spring Cloud Gateway would otherwise
            #   route task requests to project-service first.
            - id: task-service
              uri: lb://task-service
              order: -1 # specific sub-path of /projects/**; must precede project-service
              predicates:
                - Path=/api/v1/tasks/**, /api/v1/projects/*/tasks/**
            # order: 0 (default) — /notifications/** is independent (no conflict)
            - id: notification-service
              uri: lb://notification-service
              order: 0 # independent path; no conflict with existing routes
              predicates:
                - Path=/api/v1/notifications/**
            # WebSocket route — must use lb:ws:// prefix for WebSocket proxying in SCG.
            # JWT auth is handled at STOMP level by WebSocketChannelInterceptor,
            # NOT at gateway level — no JWT filter applied here.
            - id: notification-ws
              uri: lb:ws://notification-service
              order: 0
              predicates:
                - Path=/ws/notifications/**
              filters: []
            # order: 100 — /api/v1/ai/** independent path, no sub-path conflict.
            #
            # SSE streaming route — NO CircuitBreaker filter.
            # Spring Cloud Gateway's CircuitBreaker filter is incompatible with
            # SSE/streaming responses: it buffers the response to detect failures,
            # which breaks the long-lived connection and causes the stream to be
            # cut by the TimeLimiter before it completes.
            # Resilience for streaming is handled inside the ai-service itself
            # (Resilience4j CircuitBreaker on the DeepSeek adapter).
            - id: ai-service-stream
              uri: lb://ai-service
              order: 99  # higher priority than ai-service (100) to match /chat/stream first
              predicates:
                - Path=/api/v1/ai/chat/stream
                - Method=POST
            - id: ai-service
              uri: lb://ai-service
              order: 100
              predicates:
                - Path=/api/v1/ai/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: ai-service
                    fallbackUri: forward:/fallback/ai

resilience4j:
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
    instances:
      ai-service:
        timeoutDuration: 60s   # LLM calls can take up to 60s
  circuitbreaker:
    instances:
      ai-service:
        slidingWindowSize: 5
        failureRateThreshold: 60
        waitDurationInOpenState: 30s
