server:
  port: 8086

spring:
  application:
    name: ai-service
  datasource:
    url: jdbc:postgresql://epm-postgres:5432/ai_db
    username: epm_admin
    password: ${POSTGRES_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7
  data:
    redis:
      host: epm-redis
      port: 6379
  kafka:
    bootstrap-servers: epm-kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: ai-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  security:
    oauth2:
      resourceserver:
        jwt:
          jwks-uri: http://epm-keycloak:8080/realms/epm/protocol/openid-connect/certs

eureka:
  client:
    service-url:
      defaultZone: http://epm-discovery:8761/eureka/
  instance:
    prefer-ip-address: true

feign:
  client:
    config:
      project-service:
        connectTimeout: 2000
        readTimeout: 5000

ai:
  cache:
    ttl: 3600
  rate-limit:
    default: 20
    per-minute: true
  tokens:
    cost-per-1k-input: 0.00014
    cost-per-1k-output: 0.00028

resilience4j:
  circuitbreaker:
    instances:
      deepseek:
        baseConfig: default
  timelimiter:
    instances:
      deepseek:
        timeoutDuration: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://tempo:4318/v1/traces
