<div class="task-list-container">
  <div class="task-list-header">
    <h1>Tasks</h1>
    <div class="task-list-actions">
      <a mat-stroked-button [routerLink]="['..', 'kanban']">
        <mat-icon>view_kanban</mat-icon>
        Kanban View
      </a>
      <a mat-raised-button color="primary" [routerLink]="['new']">
        <mat-icon>add</mat-icon>
        New Task
      </a>
    </div>
  </div>

  @if (loading()) {
    <div class="task-list-loading">
      <mat-spinner diameter="48" />
    </div>
  }

  @if (error()) {
    <div class="error-message">{{ error() }}</div>
  }

  @if (!loading() && !error()) {
    <mat-table [dataSource]="tasks()" class="task-table">
      <ng-container matColumnDef="title">
        <mat-header-cell *matHeaderCellDef>Title</mat-header-cell>
        <mat-cell *matCellDef="let task">{{ task.title }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="status">
        <mat-header-cell *matHeaderCellDef>Status</mat-header-cell>
        <mat-cell *matCellDef="let task">{{ task.status }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="priority">
        <mat-header-cell *matHeaderCellDef>Priority</mat-header-cell>
        <mat-cell *matCellDef="let task">{{ task.priority }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="deadline">
        <mat-header-cell *matHeaderCellDef>Deadline</mat-header-cell>
        <mat-cell *matCellDef="let task">{{ task.deadline | date: 'mediumDate' }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
        <mat-cell *matCellDef="let task">
          <button mat-icon-button [attr.aria-label]="'Edit task ' + task.title">
            <mat-icon>edit</mat-icon>
          </button>
        </mat-cell>
      </ng-container>

      <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
      <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
    </mat-table>

    <mat-paginator
      [length]="totalElements()"
      [pageSize]="pageSize"
      [pageSizeOptions]="[10, 25, 50]"
      (page)="onPageChange($event)"
    />
  }
</div>
