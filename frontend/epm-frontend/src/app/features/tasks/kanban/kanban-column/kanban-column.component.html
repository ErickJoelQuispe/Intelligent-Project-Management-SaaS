<section
  class="kanban-col"
  [attr.data-status]="status()"
  [class.kanban-col--drag-over]="isDragOver()"
  (dragover)="onDragOver($event)"
  (dragenter)="onDragEnter($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
  [attr.aria-label]="statusLabel() + ' column, ' + taskCount() + ' tasks'"
  role="region"
>
  <!-- Status color strip -->
  <div class="kanban-col-strip" aria-hidden="true"></div>

  <!-- Column header -->
  <header class="kanban-col-header">
    <div class="kanban-col-title-row">
      <span class="kanban-col-dot" aria-hidden="true"></span>
      <h2 class="kanban-col-title">{{ statusKey() | transloco }}</h2>
    </div>
    <span class="kanban-col-count" [attr.aria-label]="taskCount() + ' tasks'">{{ taskCount() }}</span>
  </header>

  <!-- Drop zone indicator -->
  @if (isDragOver()) {
    <div class="kanban-drop-zone" role="status" aria-live="polite" [attr.aria-label]="'tasks.kanban.dropHere' | transloco">
      <span class="material-symbols-rounded kanban-drop-zone-icon" aria-hidden="true">file_download</span>
      <span class="kanban-drop-zone-label">{{ 'tasks.kanban.dropHere' | transloco }}</span>
    </div>
  }

  <!-- Cards list -->
  <div class="kanban-col-cards" role="list">
    @if (taskCount() === 0 && !isDragOver()) {
      <div class="kanban-col-empty" role="listitem">
        <span class="material-symbols-rounded kanban-col-empty-icon" aria-hidden="true">inbox</span>
        <span class="kanban-col-empty-text">{{ 'tasks.kanban.noTasks' | transloco }}</span>
      </div>
    } @else {
      @for (task of tasks(); track task.taskId; let i = $index) {
        <div role="listitem" [class]="'stagger-' + ((i % 6) + 1)">
          <app-task-card
            [task]="task"
            [projectId]="projectId()"
            [users]="users()"
            (deleteTask)="taskDeleted.emit($event)"
          />
        </div>
      }
    }
  </div>

</section>
