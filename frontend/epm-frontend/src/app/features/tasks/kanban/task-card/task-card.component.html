<!-- draggable="true" habilita el HTML5 DnD en este elemento -->
<div
  draggable="true"
  (dragstart)="onDragStart($event)"
  (dragend)="onDragEnd($event)"
  class="task-card-drag"
>
  <app-card padding="sm" class="block cursor-grab active:cursor-grabbing
             hover:border-glow transition-all duration-200 animate-card-in">

    <!-- Título + badge de prioridad + delete -->
    <div class="flex items-start justify-between gap-2 mb-3">
      <span class="text-text-primary text-sm font-medium leading-snug line-clamp-2 flex-1">
        {{ task().title }}
      </span>
      <div class="flex items-center gap-1 shrink-0">
        <app-task-priority-badge [priority]="task().priority" />
        <app-button variant="ghost" size="sm" (click)="onDelete($event)" title="Delete task"
                    class="opacity-0 group-hover:opacity-100 transition-opacity duration-150">
          <span class="material-symbols-rounded text-sm"
                style="color: oklch(0.65 0.22 25); font-size: 14px;">delete</span>
        </app-button>
      </div>
    </div>

    <!-- Deadline — solo si existe -->
    @if (task().deadline) {
      <div class="flex items-center gap-1.5 text-text-muted text-xs mb-2">
        <span class="material-symbols-rounded text-sm">schedule</span>
        <span>{{ task().deadline | date: 'MMM d' }}</span>
      </div>
    }

    <!-- Assignee -->
    @if (task().assigneeId) {
      <div class="flex items-center gap-2 mt-3 pt-3 border-t border-border">
        <app-avatar size="xs" [name]="assigneeName() ?? ''" />
        <span class="text-text-muted text-xs truncate">
          {{ assigneeName() }}
        </span>
      </div>
    }

  </app-card>
</div>
