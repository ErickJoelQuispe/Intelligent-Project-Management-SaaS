<app-card padding="sm" class="block cursor-pointer animate-card-in
           hover:border-glow transition-all duration-200">

  <!-- Título + badge de prioridad -->
  <div class="flex items-start justify-between gap-2 mb-3">
    <span class="text-text-primary text-sm font-medium leading-snug line-clamp-2 flex-1">
      {{ task().title }}
    </span>
    <app-task-priority-badge [priority]="task().priority" />
  </div>

  <!-- Deadline — solo si existe -->
  @if (task().deadline) {
    <div class="flex items-center gap-1.5 text-text-muted text-xs mb-2">
      <span class="material-symbols-rounded text-sm">schedule</span>
      <span>{{ task().deadline | date: 'MMM d' }}</span>
    </div>
  }

  <!-- Assignee — avatar con iniciales en lugar de UUID crudo -->
  @if (task().assigneeId) {
    <div class="flex items-center gap-2 mt-3 pt-3 border-t border-border">
      <app-avatar size="xs" [name]="task().assigneeId ?? ''" />
      <span class="text-text-muted text-xs truncate">
        {{ task().assigneeId }}
      </span>
    </div>
  }

</app-card>
