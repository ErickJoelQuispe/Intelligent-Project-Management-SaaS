<app-page-header
  [title]="taskId() ? 'Edit task' : 'New task'"
  description="Fill in the details below"
>
  <app-button page-action variant="ghost" size="sm" (click)="onCancel()">
    Cancel
  </app-button>
</app-page-header>

<div class="p-6 max-w-xl">

  @if (loadingTask()) {
    <app-spinner size="md" [full]="true" label="Loading task..." />
  }

  @if (error()) {
    <div class="mb-6">
      <app-error-banner [message]="error()!" variant="inline" />
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate
        class="flex flex-col gap-5">

    <!-- Title -->
    <div class="flex flex-col gap-1.5">
      <label class="text-text-primary text-sm font-medium" for="title">
        Title <span class="text-danger">*</span>
      </label>
      <input
        id="title"
        type="text"
        formControlName="title"
        placeholder="What needs to be done?"
        class="w-full px-3 py-2 rounded-lg text-sm
               bg-bg-elevated border border-border
               text-text-primary placeholder:text-text-muted
               focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent
               transition-colors duration-150"
      />
      @if (form.controls.title.hasError('required') && form.controls.title.touched) {
        <span class="text-danger text-xs">Title is required.</span>
      }
    </div>

    <!-- Description -->
    <div class="flex flex-col gap-1.5">
      <label class="text-text-primary text-sm font-medium" for="description">
        Description
        <span class="text-text-muted font-normal">(optional)</span>
      </label>
      <textarea
        id="description"
        formControlName="description"
        placeholder="Add more details..."
        rows="3"
        class="w-full px-3 py-2 rounded-lg text-sm resize-none
               bg-bg-elevated border border-border
               text-text-primary placeholder:text-text-muted
               focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent
               transition-colors duration-150"
      ></textarea>
    </div>

    <!-- Priority -->
    <div class="flex flex-col gap-1.5">
      <label class="text-text-primary text-sm font-medium" for="priority">
        Priority
      </label>
      <select
        id="priority"
        formControlName="priority"
        class="w-full px-3 py-2 rounded-lg text-sm
               bg-bg-elevated border border-border
               text-text-primary
               focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent
               transition-colors duration-150"
      >
        @for (p of priorities; track p.value) {
          <option [value]="p.value">{{ p.label }}</option>
        }
      </select>
    </div>

    <!-- Deadline -->
    <div class="flex flex-col gap-1.5">
      <label class="text-text-primary text-sm font-medium" for="deadline">
        Deadline
        <span class="text-text-muted font-normal">(optional)</span>
      </label>
      <input
        id="deadline"
        type="date"
        formControlName="deadline"
        class="w-full px-3 py-2 rounded-lg text-sm
               bg-bg-elevated border border-border
               text-text-primary
               focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent
               transition-colors duration-150"
      />
    </div>

    <!-- Actions -->
    <div class="flex items-center justify-end gap-3 pt-2 border-t border-border">
      <app-button type="button" variant="secondary" (click)="onCancel()">
        Cancel
      </app-button>
      <app-button type="submit" variant="primary" [loading]="loading()">
        {{ taskId() ? 'Save changes' : 'Create task' }}
      </app-button>
    </div>

  </form>
</div>
