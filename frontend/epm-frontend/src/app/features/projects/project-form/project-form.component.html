<app-page-header
  [title]="isEditMode() ? 'Edit project' : 'New project'"
  [description]="isEditMode() ? 'Update the project details' : 'Fill in the details to create a new project'"
>
  <app-button page-action variant="ghost" size="sm" (click)="onCancel()">
    Cancel
  </app-button>
</app-page-header>

<div class="p-6 max-w-xl animate-fade-up">

  @if (loading()) {
    <app-spinner size="lg" [full]="true" label="Loading project..." />
  } @else {

    @if (error()) {
      <div class="mb-6">
        <app-error-banner [message]="error()!" variant="inline" />
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate
          class="flex flex-col gap-6">

      <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold" for="name"
               style="color: var(--color-text-secondary);">
          Project name <span style="color: var(--color-danger);">*</span>
        </label>
        <input
          id="name" type="text" formControlName="name"
          placeholder="e.g. Customer portal v2"
          maxlength="100" data-testid="name-input"
          class="project-field w-full px-4 py-3 rounded-xl text-sm transition-all duration-200
                 focus:outline-none"
          style="background: var(--color-bg-surface);
                 border: 1px solid var(--color-border);
                 color: var(--color-text-primary);
                 font-family: 'Outfit', sans-serif;"
        />
        @if (form.controls.name.hasError('required') && form.controls.name.touched) {
          <span class="text-xs" style="color: var(--color-danger);">Project name is required.</span>
        }
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold" for="description"
               style="color: var(--color-text-secondary);">
          Description
          <span class="font-normal text-xs ml-1" style="color: var(--color-text-muted);">optional</span>
        </label>
        <textarea
          id="description" formControlName="description" rows="4"
          placeholder="What is this project about?"
          data-testid="description-input"
          class="project-field w-full px-4 py-3 rounded-xl text-sm resize-none transition-all duration-200
                 focus:outline-none"
          style="background: var(--color-bg-surface);
                 border: 1px solid var(--color-border);
                 color: var(--color-text-primary);
                 font-family: 'Outfit', sans-serif;"
        ></textarea>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-sm font-semibold" for="visibility"
               style="color: var(--color-text-secondary);">
          Visibility
        </label>
        <select
          id="visibility" formControlName="visibility"
          data-testid="visibility-select"
          class="project-field w-full px-4 py-3 rounded-xl text-sm transition-all duration-200
                 focus:outline-none appearance-none cursor-pointer"
          style="background: var(--color-bg-surface);
                 border: 1px solid var(--color-border);
                 color: var(--color-text-primary);
                 font-family: 'Outfit', sans-serif;"
        >
          @for (opt of visibilityOptions; track opt.value) {
            <option [value]="opt.value"
                    style="background: var(--color-bg-elevated); color: var(--color-text-primary);">
              {{ opt.label }}
            </option>
          }
        </select>
      </div>

      <!-- Divider -->
      <div class="h-px" style="background: linear-gradient(90deg, color-mix(in oklch, var(--color-accent) 30%, transparent), var(--color-border), transparent);"></div>

      <div class="flex items-center justify-end gap-3">
        <app-button type="button" variant="secondary" (click)="onCancel()">
          Cancel
        </app-button>
        <app-button type="submit" variant="primary" [loading]="submitting()" data-testid="submit-button">
          {{ isEditMode() ? 'Save changes' : 'Create project' }}
        </app-button>
      </div>

    </form>
  }
</div>

<style>
  .project-field:focus {
    border-color: var(--color-accent) !important;
    box-shadow: 0 0 0 3px var(--color-accent-subtle) !important;
    outline: none;
  }
</style>
