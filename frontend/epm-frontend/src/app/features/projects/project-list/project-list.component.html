<app-page-header
  title="Projects"
  description="Manage your team's projects"
>
  <app-button page-action variant="primary" (click)="goToCreate()">
    <span class="material-symbols-rounded text-sm">add</span>
    New project
  </app-button>
</app-page-header>

<div class="p-6 flex flex-col gap-6">

  @if (loading()) {
    <app-spinner size="lg" [full]="true" label="Loading projects..." />

  } @else if (error()) {
    <app-error-banner
      [message]="error()!"
      retryLabel="Try again"
      (retry)="loadProjects()"
    />

  } @else if (projects().length === 0) {
    <app-empty-state
      icon="folder"
      title="No projects yet"
      description="Create your first project and start managing your work."
    >
      <app-button action variant="primary" (click)="goToCreate()">
        <span class="material-symbols-rounded text-sm">add</span>
        New project
      </app-button>
    </app-empty-state>

  } @else {

    <!-- Stats bar — da contexto rápido al usuario -->
    <div class="flex items-center gap-6 px-1 animate-fade-up">
      <div class="flex items-center gap-2">
        <span class="text-2xl font-bold gradient-text"
              style="font-family: 'Outfit', sans-serif;">
          {{ projects().length }}
        </span>
        <span class="text-sm" style="color: oklch(0.55 0.015 268);">
          {{ projects().length === 1 ? 'project' : 'projects' }}
        </span>
      </div>

      <div class="h-6 w-px" style="background: oklch(0.22 0.020 268);"></div>

      <div class="flex items-center gap-1.5">
        <span class="size-2 rounded-full animate-glow-pulse"
              style="background: oklch(0.74 0.18 152);
                     box-shadow: 0 0 6px oklch(0.74 0.18 152 / 0.6);">
        </span>
        <span class="text-sm" style="color: oklch(0.55 0.015 268);">
          {{ activeCount() }} active
        </span>
      </div>
    </div>

    <!-- Grid de cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
      @for (project of projects(); track project.id; let i = $index) {
        <app-project-card
          [project]="project"
          [class]="'stagger-' + ((i % 6) + 1)"
          (projectArchived)="onProjectArchived($event)"
        />
      }
    </div>

  }

</div>
