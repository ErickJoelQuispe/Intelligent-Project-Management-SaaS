<div class="project-list-container">
  <div class="project-list-header">
    <h1>Projects</h1>
    <button mat-raised-button color="primary" (click)="navigateToCreate()">
      <mat-icon>add</mat-icon>
      New Project
    </button>
  </div>

  @if (loading()) {
    <div class="loading-container">
      <mat-spinner diameter="48"></mat-spinner>
    </div>
  } @else if (error()) {
    <div class="error-message">{{ error() }}</div>
  } @else if (projects().length === 0) {
    <div class="empty-state" data-testid="empty-state">
      <mat-icon>folder_open</mat-icon>
      <p>No projects yet. Create your first one.</p>
      <button mat-raised-button color="primary" (click)="navigateToCreate()">
        Create Project
      </button>
    </div>
  } @else {
    <mat-table [dataSource]="projects()" class="projects-table">
      <ng-container matColumnDef="name">
        <mat-header-cell *matHeaderCellDef>Name</mat-header-cell>
        <mat-cell *matCellDef="let project">{{ project.name }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="status">
        <mat-header-cell *matHeaderCellDef>Status</mat-header-cell>
        <mat-cell *matCellDef="let project">{{ project.status }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="createdAt">
        <mat-header-cell *matHeaderCellDef>Created</mat-header-cell>
        <mat-cell *matCellDef="let project">{{ project.createdAt | date:'mediumDate' }}</mat-cell>
      </ng-container>

      <ng-container matColumnDef="actions">
        <mat-header-cell *matHeaderCellDef>Actions</mat-header-cell>
        <mat-cell *matCellDef="let project">
          <a
            mat-icon-button
            [routerLink]="['/projects', project.id, 'tasks', 'kanban']"
            [attr.aria-label]="'View Kanban for ' + project.name"
          >
            <mat-icon>view_kanban</mat-icon>
          </a>
        </mat-cell>
      </ng-container>

      <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
      <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
    </mat-table>
  }
</div>
