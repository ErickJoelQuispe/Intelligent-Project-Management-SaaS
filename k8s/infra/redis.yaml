apiVersion: apps/v1
kind: Deployment
metadata:
  name: epm-redis
  namespace: epm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: epm-redis
  template:
    metadata:
      labels:
        app: epm-redis
    spec:
      containers:
        - name: redis
          image: redis:7.4-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: epm-redis
  namespace: epm
spec:
  type: ClusterIP
  selector:
    app: epm-redis
  ports:
    - port: 6379
      targetPort: 6379
