---
# ConfigMap: config-repo
# Bakes the entire config-repo/ directory into K8s so config-service can serve
# configuration to all microservices without a local bind mount.
# ADR-008: hot-reload is not available — a pod restart is required after changes.
# To update: edit the values below and run: kubectl apply -f k8s/infra/config-repo.yaml
#            then: kubectl rollout restart deployment/epm-config -n epm
apiVersion: v1
kind: ConfigMap
metadata:
  name: config-repo
  namespace: epm
data:
  application.yml: |
    # =============================================================================
    # Shared configuration for ALL microservices.
    # Each service can override any value in its own file.
    # =============================================================================

    spring:
      datasource:
        username: epm_admin
        password: changeme
      jpa:
        hibernate:
          ddl-auto: validate
        show-sql: false
        properties:
          hibernate:
            dialect: org.hibernate.dialect.PostgreSQLDialect
      flyway:
        enabled: true

    eureka:
      client:
        service-url:
          defaultZone: http://epm-discovery:8761/eureka/
      instance:
        prefer-ip-address: true

    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics,prometheus
      endpoint:
        health:
          show-details: always
      tracing:
        sampling:
          probability: 1.0
      otlp:
        tracing:
          endpoint: http://tempo:4318/v1/traces

    resilience4j:
      circuitbreaker:
        configs:
          default:
            slidingWindowSize: 10
            failureRateThreshold: 50
            waitDurationInOpenState: 30s
            permittedNumberOfCallsInHalfOpenState: 3
            slowCallRateThreshold: 100
            slowCallDurationThreshold: 5s
        instances:
          default:
            baseConfig: default
      retry:
        configs:
          default:
            maxAttempts: 3
            waitDuration: 500ms
            enableExponentialBackoff: true
            exponentialBackoffMultiplier: 1.5
        instances:
          default:
            baseConfig: default
      timelimiter:
        configs:
          default:
            timeoutDuration: 5s
        instances:
          default:
            baseConfig: default

    logging:
      level:
        com.epm: DEBUG

  api-gateway.yml: |
    spring:
      datasource:
        url: ""
      jpa:
        hibernate:
          ddl-auto: none
      flyway:
        enabled: false
      reactor:
        context-propagation: auto
      cloud:
        gateway:
          server:
            webflux:
              globalcors:
                cors-configurations:
                  '[/**]':
                    allowedOrigins:
                      - "http://localhost:4200"
                      - "http://localhost"
                    allowedMethods:
                      - GET
                      - POST
                      - PUT
                      - PATCH
                      - DELETE
                      - OPTIONS
                    allowedHeaders:
                      - "*"
                    allowCredentials: true
                    maxAge: 3600
              routes:
                - id: auth-register-public
                  uri: lb://auth-service
                  predicates:
                    - Path=/api/v1/auth/register
                    - Method=POST
                - id: auth-service
                  uri: lb://auth-service
                  predicates:
                    - Path=/api/v1/auth/**
                - id: user-service
                  uri: lb://user-service
                  predicates:
                    - Path=/api/v1/users/**
                - id: teams-service
                  uri: lb://user-service
                  predicates:
                    - Path=/api/v1/teams/**
                - id: project-service
                  uri: lb://project-service
                  predicates:
                    - Path=/api/v1/projects/**
                - id: task-service
                  uri: lb://task-service
                  order: -1
                  predicates:
                    - Path=/api/v1/tasks/**, /api/v1/projects/*/tasks/**
                - id: notification-service
                  uri: lb://notification-service
                  order: 0
                  predicates:
                    - Path=/api/v1/notifications/**
                - id: notification-ws
                  uri: lb:ws://notification-service
                  order: 0
                  predicates:
                    - Path=/ws/notifications/**
                  filters: []
                - id: ai-service
                  uri: lb://ai-service
                  order: 100
                  predicates:
                    - Path=/api/v1/ai/**
                  filters:
                    - name: CircuitBreaker
                      args:
                        name: ai-service
                        fallbackUri: forward:/fallback/ai

  auth-service.yml: |
    spring:
      datasource:
        url: jdbc:postgresql://epm-postgres:5432/auth_db
      kafka:
        bootstrap-servers: epm-kafka:9092
        producer:
          key-serializer: org.apache.kafka.common.serialization.StringSerializer
          value-serializer: org.apache.kafka.common.serialization.StringSerializer
      security:
        oauth2:
          resourceserver:
            jwt:
              jwks-uri: http://epm-keycloak:8080/realms/epm/protocol/openid-connect/certs
      flyway:
        enabled: true

    keycloak:
      server-url: http://epm-keycloak:8080
      realm: epm
      client-id: epm-backend
      client-secret: ${KEYCLOAK_CLIENT_SECRET}

    server:
      port: 8081

    resilience4j:
      circuitbreaker:
        instances:
          keycloak:
            sliding-window-type: COUNT_BASED
            sliding-window-size: 10
            failure-rate-threshold: 50
            wait-duration-in-open-state: 30s
            permitted-number-of-calls-in-half-open-state: 3
      retry:
        instances:
          keycloak:
            max-attempts: 3
            wait-duration: 500ms
      timelimiter:
        instances:
          keycloak:
            timeout-duration: 3s

  user-service.yml: |
    spring:
      datasource:
        url: jdbc:postgresql://epm-postgres:5432/user_db
      kafka:
        bootstrap-servers: epm-kafka:9092
        producer:
          key-serializer: org.apache.kafka.common.serialization.StringSerializer
          value-serializer: org.apache.kafka.common.serialization.StringSerializer
        consumer:
          group-id: user-service
          auto-offset-reset: earliest
          key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
          value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      security:
        oauth2:
          resourceserver:
            jwt:
              jwks-uri: http://epm-keycloak:8080/realms/epm/protocol/openid-connect/certs
      flyway:
        enabled: true

    server:
      port: 8082

    resilience4j:
      circuitbreaker:
        instances:
          userService:
            baseConfig: default

  project-service.yml: |
    server:
      port: 8083

    spring:
      datasource:
        url: jdbc:postgresql://epm-postgres:5432/project_db
        driver-class-name: org.postgresql.Driver
      jpa:
        hibernate:
          ddl-auto: validate
        show-sql: false
      flyway:
        enabled: true
        locations: classpath:db/migration
      kafka:
        bootstrap-servers: epm-kafka:9092
        producer:
          key-serializer: org.apache.kafka.common.serialization.StringSerializer
          value-serializer: org.apache.kafka.common.serialization.StringSerializer
        consumer:
          group-id: project-service
          auto-offset-reset: earliest
          key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
          value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      security:
        oauth2:
          resourceserver:
            jwt:
              jwks-uri: http://epm-keycloak:8080/realms/epm/protocol/openid-connect/certs

    eureka:
      client:
        service-url:
          defaultZone: http://epm-discovery:8761/eureka/
      instance:
        prefer-ip-address: true

    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics

    resilience4j:
      circuitbreaker:
        instances:
          projectService:
            baseConfig: default

  task-service.yml: |
    server:
      port: 8084

    spring:
      datasource:
        url: jdbc:postgresql://epm-postgres:5432/task_db
        username: epm_admin
        password: changeme
        driver-class-name: org.postgresql.Driver
      jpa:
        hibernate:
          ddl-auto: validate
        show-sql: false
        properties:
          hibernate:
            dialect: org.hibernate.dialect.PostgreSQLDialect
      flyway:
        enabled: true
        locations: classpath:db/migration
      kafka:
        bootstrap-servers: epm-kafka:9092
        listener:
          missing-topics-fatal: false
        producer:
          key-serializer: org.apache.kafka.common.serialization.StringSerializer
          value-serializer: org.apache.kafka.common.serialization.StringSerializer
        consumer:
          group-id: task-service
          auto-offset-reset: earliest
          key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
          value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      security:
        oauth2:
          resourceserver:
            jwt:
              jwks-uri: http://epm-keycloak:8080/realms/epm/protocol/openid-connect/certs

    eureka:
      client:
        service-url:
          defaultZone: http://epm-discovery:8761/eureka/
      instance:
        prefer-ip-address: true

    feign:
      client:
        config:
          project-service:
            connectTimeout: 2000
            readTimeout: 2000

    resilience4j:
      circuitbreaker:
        instances:
          projectService:
            failureRateThreshold: 50
            minimumNumberOfCalls: 3
            slidingWindowSize: 5
            waitDurationInOpenState: 30s
      timelimiter:
        instances:
          projectService:
            timeoutDuration: 2s

    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics

  ai-service.yml: |
    server:
      port: 8086

    spring:
      application:
        name: ai-service
      datasource:
        url: jdbc:postgresql://epm-postgres:5432/ai_db
        username: epm_admin
        password: ${POSTGRES_PASSWORD:changeme}
        driver-class-name: org.postgresql.Driver
      jpa:
        hibernate:
          ddl-auto: validate
        show-sql: false
        properties:
          hibernate:
            dialect: org.hibernate.dialect.PostgreSQLDialect
      flyway:
        enabled: true
        locations: classpath:db/migration
      ai:
        openai:
          api-key: ${DEEPSEEK_API_KEY}
          base-url: https://api.deepseek.com
          chat:
            options:
              model: deepseek-chat
              temperature: 0.7
      data:
        redis:
          host: epm-redis
          port: 6379
      kafka:
        bootstrap-servers: epm-kafka:9092
        producer:
          key-serializer: org.apache.kafka.common.serialization.StringSerializer
          value-serializer: org.apache.kafka.common.serialization.StringSerializer
        consumer:
          group-id: ai-service
          auto-offset-reset: earliest
          key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
          value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      security:
        oauth2:
          resourceserver:
            jwt:
              jwks-uri: http://epm-keycloak:8080/realms/epm/protocol/openid-connect/certs

    eureka:
      client:
        service-url:
          defaultZone: http://epm-discovery:8761/eureka/
      instance:
        prefer-ip-address: true

    feign:
      client:
        config:
          project-service:
            connectTimeout: 2000
            readTimeout: 5000

    ai:
      cache:
        ttl: 3600
      rate-limit:
        default: 20
        per-minute: true
      tokens:
        cost-per-1k-input: 0.00014
        cost-per-1k-output: 0.00028

    resilience4j:
      circuitbreaker:
        configs:
          default:
            slidingWindowSize: 10
            failureRateThreshold: 50
            waitDurationInOpenState: 30s
            permittedNumberOfCallsInHalfOpenState: 3
        instances:
          deepseek:
            baseConfig: default
      timelimiter:
        instances:
          deepseek:
            timeoutDuration: 30s

    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics,prometheus
      endpoint:
        health:
          show-details: always
      tracing:
        sampling:
          probability: 1.0
      otlp:
        tracing:
          endpoint: http://tempo:4318/v1/traces

  notification-service.yml: |
    server:
      port: 8085

    spring:
      datasource:
        url: jdbc:postgresql://epm-postgres:5432/notification_db
        username: epm_admin
        password: changeme
        driver-class-name: org.postgresql.Driver
      jpa:
        hibernate:
          ddl-auto: validate
        show-sql: false
        properties:
          hibernate:
            dialect: org.hibernate.dialect.PostgreSQLDialect
      flyway:
        enabled: true
        locations: classpath:db/migration
      kafka:
        bootstrap-servers: epm-kafka:9092
        consumer:
          group-id: notification-group
          auto-offset-reset: earliest
          key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
          value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      security:
        oauth2:
          resourceserver:
            jwt:
              jwks-uri: http://epm-keycloak:8080/realms/epm/protocol/openid-connect/certs
      mail:
        host: epm-mailhog
        port: 1025
        properties:
          mail:
            smtp:
              auth: false
              starttls:
                enable: false

    eureka:
      client:
        service-url:
          defaultZone: http://epm-discovery:8761/eureka/
      instance:
        prefer-ip-address: true

    notifications:
      email:
        enabled: true

    management:
      endpoints:
        web:
          exposure:
            include: health,info,metrics
      endpoint:
        health:
          show-details: always

    resilience4j:
      circuitbreaker:
        instances:
          emailAdapter:
            baseConfig: default

  discovery-service.yml: |
    spring:
      datasource:
        url: ""
      jpa:
        hibernate:
          ddl-auto: none
      flyway:
        enabled: false

  config-service.yml: |
    spring:
      datasource:
        url: ""
      jpa:
        hibernate:
          ddl-auto: none
      flyway:
        enabled: false
