apiVersion: v1
kind: ConfigMap
metadata:
  name: epm-config
  namespace: epm
data:
  EUREKA_DEFAULT_ZONE: "http://epm-discovery:8761/eureka"
  SPRING_CLOUD_CONFIG_URI: "http://epm-config:8888"
  KAFKA_BOOTSTRAP_SERVERS: "epm-kafka:9092"
  REDIS_HOST: "epm-redis"
  REDIS_PORT: "6379"
  KEYCLOAK_AUTH_SERVER_URL: "http://epm-keycloak:8080"
  KEYCLOAK_REALM: "epm"
