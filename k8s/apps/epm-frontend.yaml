---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: epm-frontend
  namespace: epm
  labels:
    app: epm-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: epm-frontend
  template:
    metadata:
      labels:
        app: epm-frontend
    spec:
      containers:
        - name: epm-frontend
          image: ghcr.io/erickjoelquispe/epm-frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 128m
              memory: 256Mi
            limits:
              cpu: 256m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 20
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: epm-frontend
  namespace: epm
  labels:
    app: epm-frontend
spec:
  type: ClusterIP
  selector:
    app: epm-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
