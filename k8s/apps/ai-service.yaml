---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: epm-ai
  namespace: epm
  labels:
    app: epm-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      app: epm-ai
  template:
    metadata:
      labels:
        app: epm-ai
    spec:
      containers:
        - name: ai-service
          image: ghcr.io/erickjoelquispe/epm-ai:latest
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef:
                name: epm-config
            - secretRef:
                name: epm-secrets
          resources:
            requests:
              cpu: 512m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8086
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: epm-ai
  namespace: epm
  labels:
    app: epm-ai
spec:
  type: ClusterIP
  selector:
    app: epm-ai
  ports:
    - name: http
      port: 8086
      targetPort: 8086
