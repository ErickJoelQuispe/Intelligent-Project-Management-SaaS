---
# NOTE: config-service reads configuration from a ./config-repo bind mount in docker-compose.
# In Kubernetes, bind mounts are not supported. For Phase 10 (dev scope), the config-repo
# content is baked into ConfigMap 'config-repo' (see k8s/infra/configmaps.yaml) and mounted
# as a read-only volume at /config-repo. Hot-reload of config-repo is not available in this
# setup; a full pod restart is required to pick up config changes. This is a known limitation
# documented in ADR-008.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: epm-config
  namespace: epm
  labels:
    app: epm-config
spec:
  replicas: 1
  selector:
    matchLabels:
      app: epm-config
  template:
    metadata:
      labels:
        app: epm-config
    spec:
      containers:
        - name: config-service
          image: ghcr.io/erickjoelquispe/epm-config:latest
          ports:
            - containerPort: 8888
          envFrom:
            - configMapRef:
                name: epm-config
            - secretRef:
                name: epm-secrets
          env:
            - name: CONFIG_REPO_PATH
              value: /config-repo
          resources:
            requests:
              cpu: 256m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8888
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: epm-config
  namespace: epm
  labels:
    app: epm-config
spec:
  type: ClusterIP
  selector:
    app: epm-config
  ports:
    - name: http
      port: 8888
      targetPort: 8888
