---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: epm-project
  namespace: epm
  labels:
    app: epm-project
spec:
  replicas: 1
  selector:
    matchLabels:
      app: epm-project
  template:
    metadata:
      labels:
        app: epm-project
    spec:
      containers:
        - name: project-service
          image: ghcr.io/erickjoelquispe/epm-project:latest
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: epm-config
            - secretRef:
                name: epm-secrets
          resources:
            requests:
              cpu: 256m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: epm-project
  namespace: epm
  labels:
    app: epm-project
spec:
  type: ClusterIP
  selector:
    app: epm-project
  ports:
    - name: http
      port: 8083
      targetPort: 8083
