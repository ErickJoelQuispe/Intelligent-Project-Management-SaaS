spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
  security:
    oauth2:
      resourceserver:
        jwt:
          jwks-uri: https://example.com/.well-known/jwks.json
  data:
    redis:
      host: localhost
      port: 6379
  ai:
    openai:
      api-key: test-key
      base-url: https://api.deepseek.com

server:
  port: 0

# Sensitive circuit breaker config so context-loading tests open/recover fast.
resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 2
        minimumNumberOfCalls: 2
        failureRateThreshold: 50
        waitDurationInOpenState: 100ms
        permittedNumberOfCallsInHalfOpenState: 1
    instances:
      deepseek:
        baseConfig: default

eureka:
  client:
    enabled: false
