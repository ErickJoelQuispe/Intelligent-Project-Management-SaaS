spring:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    consumer:
      group-id: notification-group-test
  security:
    oauth2:
      resourceserver:
        jwt:
          jwks-uri: http://localhost:8180/realms/epm/protocol/openid-connect/certs
  mail:
    host: localhost
    port: 1025

server:
  port: 0
