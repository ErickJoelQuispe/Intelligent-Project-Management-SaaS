<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Task Assigned</title>
</head>
<body>
    <h1>Task Assigned to You</h1>
    <p>Hi <span th:text="${assigneeName}">Assignee</span>,</p>
    <p>
        You have been assigned the task
        <strong th:text="${taskTitle}">Task Title</strong>
        in project <strong th:text="${projectName}">Project Name</strong>.
    </p>
    <p>
        <a th:href="${taskUrl}">View Task</a>
    </p>
    <hr />
    <p>This is an automated notification from your project management system.</p>
</body>
</html>
