spring:
  config:
    import: ""
  datasource:
    url: jdbc:postgresql://localhost:5432/test_db  # overridden by @DynamicPropertySource
    username: test
    password: test
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
  security:
    oauth2:
      resourceserver:
        jwt:
          jwks-uri: https://example.com/.well-known/jwks.json

server:
  port: 0

eureka:
  client:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health
