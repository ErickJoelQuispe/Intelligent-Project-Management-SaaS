spring:
  config:
    import: ""
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092
  security:
    oauth2:
      resourceserver:
        jwt:
          jwks-uri: https://example.com/.well-known/jwks.json

keycloak:
  server-url: http://localhost:8180
  realm: epm
  client-id: epm-backend
  client-secret: test-secret

server:
  port: 0

eureka:
  client:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health
