spring:
  application:
    name: service-template
  config:
    import: "optional:configserver:"
  datasource:
    url: jdbc:postgresql://localhost:5432/template_db
    username: epm_admin
    password: changeme
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

eureka:
  client:
    enabled: false   # disabled for standalone local testing
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.epm: DEBUG
