spring:
  application:
    name: service-template-test
  config:
    import: ""   # disable config server in tests
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: localhost:9092

eureka:
  client:
    enabled: false

logging:
  level:
    com.epm: DEBUG
