spring:
  application:
    name: service-template-test
  config:
    import: ""   # disable config server in tests
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false   # DDL handled by Hibernate in tests

eureka:
  client:
    enabled: false

logging:
  level:
    com.epm: DEBUG
